services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bank
      POSTGRES_PASSWORD: bank
      POSTGRES_DB: bank
    ports:
      - '5432:5432'
    volumes:
      - bank-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bank -d bank']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bank-postgres-data:
